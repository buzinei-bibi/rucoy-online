<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fale conosco</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Press Start 2P", cursive;
      }
    </style>
  </head>

  <body class="bg-black text-white min-h-screen p-6">
    <main class="w-full max-w-7xl mx-auto rounded-[35px] p-5 flex flex-col gap-5">

      <!-- CABEÇALHO -->
      <header class="w-full rounded-[20px] px-6 py-2 flex items-start justify-between gap-6">

        <!-- LOGOTIPO -->
        <img
          src="imagens/logotipo.png"
          class="w-24 -mt-4 object-contain"
          alt="logotipo"
        />

        <!-- MEIO -->
        <div class="hidden md:flex items-center gap-6 text-[10px] text-zinc-400 mt-3">
          <a href="#" class="hover:text-red-700 duration-300">SUPORTE</a>
          <a href="#" class="hover:text-red-700 duration-300">COMUNIDADE</a>
          <a href="#" class="hover:text-red-700 duration-300">FAQ</a>
        </div>

        <!-- MENU -->
        <nav class="flex items-center gap-4 text-[10px] mt-2">
          <a href="#" class="hover:text-red-700 duration-300">
            HOME
          </a>

          <a href="#" class="hover:text-red-700 duration-300">
            QUEM SOMOS
          </a>

          <a
            href="#"
            class="bg-red-800 hover:bg-red-700 duration-300 px-5 py-3 rounded-xl"
          >
            FALE CONOSCO
          </a>
        </nav>
      </header>

      <!-- CONTATO + FORMULÁRIO -->
      <section class="w-full flex gap-6 flex-col lg:flex-row text-red-700">
        <aside
          class="w-full lg:w-4/12 border border-zinc-100 rounded-[25px] p-10 flex flex-col justify-center gap-8 text-[10px] leading-6"
        >
          <h2 class="text-sm mb-3">CONTATO</h2>

          <p class="flex items-center gap-4">
            <i class="bi bi-telephone text-xl"></i>
            <span>+55 (21) 1234-5678</span>
          </p>

          <p class="flex items-center gap-4">
            <i class="bi bi-envelope text-xl"></i>
            <span>rucoyonline@gmail.com</span>
          </p>

          <p class="flex items-center gap-4">
            <i class="bi bi-geo-alt text-xl"></i>
            <span>endereço</span>
          </p>
        </aside>

        <section
          class="w-full lg:w-8/12 rounded-[25px] p-2 lg:p-8 flex flex-col gap-6"
        >
          <h1 class="text-sm">FALE CONOSCO</h1>

          <form class="grid grid-cols-1 md:grid-cols-2 gap-5 text-[10px]">
            <input
              type="text"
              placeholder="digite seu nome"
              class="bg-white text-black rounded-xl px-4 py-4 outline-none border-2 border-transparent focus:border-red-700 duration-300"
            />

            <input
              type="email"
              placeholder="e-mail"
              class="bg-white text-black rounded-xl px-4 py-4 outline-none border-2 border-transparent focus:border-red-700 duration-300"
            />

            <input
              type="text"
              placeholder="assunto"
              class="md:col-span-2 bg-white text-black rounded-xl px-4 py-4 outline-none border-2 border-transparent focus:border-red-700 duration-300"
            />

            <textarea
              placeholder="mensagem"
              rows="6"
              class="md:col-span-2 bg-white text-black rounded-xl px-4 py-4 outline-none resize-none border-2 border-transparent focus:border-red-700 duration-300"
            ></textarea>

            <button
              type="submit"
              class="bg-red-800 hover:bg-red-700 duration-300 px-6 py-4 rounded-xl w-fit text-white"
            >
              enviar mensagem
            </button>
          </form>
        </section>
      </section>

      <!-- GOOGLE MAPS -->
      <section class="w-full rounded-[25px] p-6 flex flex-col gap-4">
        <h2 class="text-sm text-center">GOOGLE MAPS</h2>

        <div class="w-full h-64 rounded-2xl overflow-hidden border border-zinc-600">
          <iframe
            src="https://www.google.com/maps?q=BarraDaTijuca,RioDeJaneiro,Brasil&output=embed"
            class="w-full h-full"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>
      </section>

      <!-- RODAPÉ -->
      <footer
        class="w-full rounded-[25px] px-8 py-6 flex flex-col lg:flex-row items-center justify-between gap-6"
      >
        <img src="imagens/logotipo negativa.png" class="w-28" alt="logo" />

        <div class="flex items-center gap-6 text-[10px]">
          <a href="#" class="hover:text-red-700 duration-300">HOME</a>
          <a href="#" class="hover:text-red-700 duration-300">QUEM SOMOS</a>
          <a href="#" class="hover:text-red-700 duration-300">CONTATO</a>
        </div>

        <div class="flex gap-4 text-xl">
          <a href="#">
            <i class="bi bi-discord hover:text-red-700 transition duration-300"></i>
          </a>

          <a href="#">
            <i class="bi bi-twitter hover:text-red-700 transition duration-300"></i>
          </a>

          <a href="#">
            <i class="bi bi-instagram hover:text-red-700 transition duration-300"></i>
          </a>
        </div>
      </footer>
    </main>
  </body>
</html>
