<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>quem somos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen p-6">

  <!-- CONTAINER -->
  <main class="w-full max-w-7xl mx-auto rounded-[35px] p-6 flex flex-col gap-10">

    <!-- CABEÇALHO -->
    <header class="w-full rounded-[25px] px-6 py-3 flex items-center justify-between">

      <!-- LOGO -->
      <img src="imagens/logotipo.png" class="w-28" alt="logotipo">

      <!-- MENU NO CANTO -->
      <nav class="flex items-center gap-4 text-[10px]">

        <a href="#" class="hover:text-red-500 duration-300">
          HOME
        </a>

        <a href="#" class="bg-red-800 hover:bg-red-700 duration-300 px-5 py-3 rounded-xl">
          QUEM SOMOS
        </a>

        <a href="#" class="hover:text-red-500 duration-300">
          FALE CONOSCO
        </a>

      </nav>
    </header>

    <!-- QUEM SOMOS -->
    <section class="w-full flex flex-col md:flex-row gap-8 items-center">

      <!-- BANNER -->
      <div class="w-full md:w-7/12 overflow-hidden rounded-3xl">

        <img src="imagens/banner.png" class="w-full h-[450px] object-cover rounded-3xl" alt="banner">

      </div>

      <!-- TEXTO -->
      <div class="w-full md:w-5/12 flex flex-col gap-6">

        <div class="text-sm text-red-500">
          QUEM SOMOS
        </div>

        <h1 class="text-3xl leading-relaxed">
          bem-vindo ao rucoy online
        </h1>

        <p class="text-[10px] leading-7 text-zinc-300">
          explore um mundo cheio de aventuras, monstros,
          guildas e batalhas épicas. escolha sua classe,
          evolua seu personagem e enfrente desafios incríveis.
        </p>

        <button class="bg-red-800 hover:bg-red-700
                 transition-all duration-300
                 px-6 py-4 rounded-xl text-[10px] w-fit">
          ver mais
        </button>

      </div>

    </section>

    <!-- NOSSOS AMBIENTES -->
    <section class="w-full flex flex-col gap-6">

      <!-- TÍTULO -->
      <div class="text-sm text-write">
        NOSSOS AMBIENTES
      </div>

      <!-- CARDS -->
      <div class="w-full grid grid-cols-1 md:grid-cols-4 gap-6">

        <!-- QUARTO -->
        <div class="rounded-2xl overflow-hidden cursor-pointer bg-black
                 shadow-[0_0_15px_gray]
                 transition-all duration-500
                 hover:scale-110
                 hover:shadow-[0_0_45px_rgba(34,197,94,1)]">

          <img src="imagens/quarto.png" class="w-full rounded-2xl" alt="quarto">

        </div>

        <!-- ESPAÇO -->
        <div class="rounded-2xl overflow-hidden cursor-pointer bg-black
                 shadow-[0_0_15px_gray]
                 transition-all duration-500
                 hover:scale-110
                 hover:shadow-[0_0_45px_rgba(234,179,8,1)]">

          <img src="imagens/espaço.png" class="w-full rounded-2xl" alt="espaço">

        </div>

        <!-- SALA -->
        <div class="rounded-2xl overflow-hidden cursor-pointer bg-black
                 shadow-[0_0_15px_gray]
                 transition-all duration-500
                 hover:scale-110
                 hover:shadow-[0_0_45px_rgba(59,130,246,1)]">

          <img src="imagens/sala.png" class="w-full rounded-2xl" alt="sala">

        </div>

        <!-- BAR -->
        <div class="rounded-2xl overflow-hidden cursor-pointer bg-black
                 shadow-[0_0_15px_gray]
                 transition-all duration-500
                 hover:scale-110
                 hover:shadow-[0_0_45px_rgba(239,68,68,1)]">

          <img src="imagens/bar.png" class="w-full rounded-2xl" alt="bar">

        </div>

      </div>

    </section>

    <!-- RODAPÉ -->
    <footer class="w-full rounded-[30px] px-8 py-8 flex flex-col md:flex-row items-center justify-between gap-6">

      <!-- LOGO -->
      <img src="imagens/logotipo negativa.png" class="w-28" alt="logotipo">

      <!-- LINKS -->
      <div class="flex items-center gap-6 text-[10px] flex-wrap">

        <a href="#" class="hover:text-red-500 duration-300">
          HOME
        </a>

        <a href="#" class="hover:text-red-500 duration-300">
          QUEM SOMOS
        </a>

        <a href="#" class="hover:text-red-500 duration-300">
          CONTATO
        </a>

      </div>

      <!-- ÍCONES -->
      <div class="flex gap-4 text-xl">

        <a href="">
          <i class="bi bi-discord hover:text-red-500 transition duration-300"></i>
        </a>

        <a href="">
          <i class="bi bi-twitter hover:text-red-500 transition duration-300"></i>
        </a>

        <a href="">
          <i class="bi bi-instagram hover:text-red-500 transition duration-300"></i>
        </a>

      </div>
    </footer>
  </main>
</body>

</html>
