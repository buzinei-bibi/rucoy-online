<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rucoy online</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
    }
  </style>
</head>

<body class="bg-black">
  <div class="w-full max-w-7xl mx-auto bg-black">

    <!-- TOPO -->
    <header class="w-full p-6 flex items-center justify-between gap-8">

      <!-- LOGO -->
      <img src="imagens/logotipo.png" alt="logotipo" class="w-32 object-contain">

      <!-- PESQUISA -->
      <div class="flex items-center gap-3 flex-1 max-w-xl">
        <i class="bi bi-search text-gray-400 text-sm"></i>

        <input
          type="text"
          placeholder="pesquise por jogadores, guildas ..."
          class="w-full h-12 bg-zinc-900 rounded-full px-6 text-[10px] text-white
                 outline-none border border-zinc-700 focus:border-red-700
                 leading-none"
        >
      </div>

      <!-- LINKS -->
      <nav class="flex items-center gap-4 whitespace-nowrap text-white font-bold text-[10px]">
        <a
          class="bg-red-900 hover:bg-red-700 text-white py-3 px-6 rounded-xl transition duration-300"
          href="">
          HOME
        </a>

        <a class="hover:text-red-900 transition duration-300" href="">
          QUEM SOMOS
        </a>

        <a class="hover:text-red-900 transition duration-300" href="">
          FALE CONOSCO
        </a>
      </nav>

    </header>

    <!-- BANNER -->
    <div class="w-full flex gap-4 p-4 flex-col md:flex-row">
      <div class="w-full flex flex-col">

        <img src="imagens/banner.png" alt="banner" class="w-full rounded-xl">

        <!-- CARDS -->
        <div class="w-full flex flex-col md:flex-row gap-4 p-4">

          <!-- PVP -->
          <div class="w-full flex flex-col shadow-[0_0_15px_gray] rounded-xl bg-black overflow-hidden 
                      transition-all duration-300 hover:scale-105 hover:shadow-[0_0_25px_red]">

            <img src="imagens/pvp.png" alt="pvp" class="w-full rounded-t-xl" />

            <div class="p-4">
              <button
                class="w-full bg-black hover:shadow-[0_0_25px_red] transition-all duration-300 text-white font-bold py-2 px-5 rounded-lg shadow-lg">
                ver mais
              </button>
            </div>
          </div>

          <!-- GUILDA -->
          <div class="w-full flex flex-col shadow-[0_0_15px_gray] rounded-xl bg-black overflow-hidden 
                      transition-all duration-300 hover:scale-105 hover:shadow-[0_0_25px_gold]">

            <img src="imagens/guilda.png" alt="guilda" class="w-full rounded-t-xl" />

            <div class="p-4">
              <button
                class="w-full bg-black hover:shadow-[0_0_25px_gold] transition-all duration-300 text-white font-bold py-2 px-5 rounded-lg shadow-lg">
                ver mais
              </button>
            </div>
          </div>

          <!-- CLASSES -->
          <div class="w-full flex flex-col shadow-[0_0_15px_gray] rounded-xl bg-black overflow-hidden 
                      transition-all duration-300 hover:scale-105 hover:shadow-[0_0_25px_blue]">

            <img src="imagens/classes.png" alt="classes" class="w-full rounded-t-xl" />

            <div class="p-4">
              <button
                class="w-full bg-black hover:shadow-[0_0_25px_blue] transition-all duration-300 text-white font-bold py-2 px-5 rounded-lg shadow-lg">
                ver mais
              </button>
            </div>
          </div>

        </div>

        <!-- RODAPÉ -->
        <footer class="w-full flex items-center justify-between bg-black text-white p-6 rounded-xl">

          <!-- LOGO -->
          <img src="imagens/logotipo negativa.png" alt="logotipo" class="w-40" />

          <!-- MENU + REDES -->
          <div class="flex flex-col items-end gap-4">

            <div class="flex gap-6 text-sm font-semibold">
              <a class="hover:text-red-900 transition duration-300" href="">HOME</a>
              <a class="hover:text-red-900 transition duration-300" href="">QUEM SOMOS</a>
              <a class="hover:text-red-900 transition duration-300" href="">FALE CONOSCO</a>
            </div>

            <div class="flex gap-4 text-xl">
              <a href=""><i class="bi bi-discord hover:text-red-900 transition duration-300"></i></a>
              <a href=""><i class="bi bi-twitter hover:text-red-900 transition duration-300"></i></a>
              <a href=""><i class="bi bi-instagram hover:text-red-900 transition duration-300"></i></a>
            </div>

          </div>
        </footer>

      </div>
    </div>
  </div>
</body>

</html>
